<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTB Elektrik Bakım</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <!-- Login Overlay -->
  <div id="login-overlay">
    <div class="login-card">
      <div class="login-logo">
        <img class="login-logo-image" src="../assets/mtb-breakers-logo.png" alt="İnan Makina" />
        <div class="login-logo-text">
          <div class="t1">MTB Elektrik Bakım</div>
          <div class="t2">CNC Bakım & Teşhis Platformu</div>
        </div>
      </div>
      <div class="login-users" id="login-user-list"></div>
      <div id="login-pin-wrap">
        <div id="login-pin-label">PIN giriniz</div>
        <input type="password" id="login-pin-input" maxlength="6" placeholder="••••" autocomplete="off" />
        <div class="login-pin-error" id="login-pin-error"></div>
        <button class="btn btn-ghost btn-sm" onclick="loginBack()" style="align-self:center">← Geri</button>
      </div>
    </div>
  </div>

  <!-- Spotlight Search Overlay -->
  <div id="spotlight-overlay" onclick="closeSpotlight(event)">
    <div id="spotlight-box">
      <div id="spotlight-input-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="spotlight-input" placeholder="Ara: alarm, parametre, tezgah, bakım..." autocomplete="off" />
        <span id="spotlight-kbd">ESC ile kapat</span>
      </div>
      <div id="spotlight-results"></div>
    </div>
  </div>

  <!-- Notification Panel -->
  <div id="notif-panel">
    <div id="notif-panel-header">
      <span>🔔 Bildirimler</span>
      <button onclick="closeNotifPanel()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:16px">✕</button>
    </div>
    <div id="notif-panel-body"></div>
  </div>

  <!-- Custom Title Bar -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-logo">
      <img class="titlebar-logo-image" src="../assets/mtb-breakers-logo.png" alt="İnan Makina" />
      <span>MTB Elektrik Bakım</span>
    </div>
    <div class="titlebar-drag"></div>
    <div class="titlebar-controls">
      <!-- Search button -->
      <button class="tb-btn" id="btn-spotlight" title="Ara (Ctrl+K)">
        <svg viewBox="0 0 24 24" style="width:13px;height:13px"><circle cx="11" cy="11" r="7"/><path d="m21 21-3.5-3.5"/></svg>
      </button>
      <!-- Notification bell -->
      <div class="tb-notif-wrap">
        <button class="tb-btn" id="btn-notif" title="Bildirimler">
          <svg viewBox="0 0 24 24" style="width:13px;height:13px"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        </button>
        <div id="notif-badge"></div>
      </div>
      <!-- User avatar -->
      <button id="user-avatar-btn" title="Kullanıcı değiştir">
        <div class="user-avatar-circle" id="user-avatar-circle" style="background:#3b82f6">A</div>
        <span id="user-avatar-name">Admin</span>
      </button>
      <button id="btn-minimize" class="tb-btn"><svg viewBox="0 0 10 2"><rect width="10" height="1.5" y="0.25" rx="1" fill="currentColor"/></svg></button>
      <button id="btn-maximize" class="tb-btn"><svg viewBox="0 0 10 10"><rect x="1" y="1" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></button>
      <button id="btn-close"    class="tb-btn close"><svg viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
    </div>
  </div>

  <!-- App Shell -->
  <div class="app-shell">
    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <img class="sidebar-logo-image" src="../assets/mtb-breakers-logo.png" alt="İnan Makina" />
          <div class="brand-text">
            <span class="brand-name">MTB</span>
            <span class="brand-sub">Elektrik bakım</span>
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <span class="sidebar-label">ANA MODÜLLER</span>
        <button class="nav-item active" data-page="dashboard" id="nav-dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-page="library" id="nav-library">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
          <span>Tezgah Kitaplığı</span>
          <span class="nav-badge">7</span>
        </button>
        <button class="nav-item" data-page="projects" id="nav-projects">
          <svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <span>Projeler</span>
        </button>
      </div>
      
      <div class="sidebar-section">
        <span class="sidebar-label">TEZGAH TAKİP</span>
        <button class="nav-item" data-page="machines" id="nav-machines">
          <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
          <span>Tezgah Listesi</span>
        </button>
        <button class="nav-item" data-page="maintenance" id="nav-maintenance">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
          <span>Bakım Defteri</span>
        </button>
        <button class="nav-item" data-page="battery" id="nav-battery">
          <svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="7" width="16" height="10" rx="2" ry="2"/><line x1="18" y1="11" x2="22" y2="11"/><line x1="18" y1="13" x2="22" y2="13"/></svg>
          <span>Pil Takibi</span>
        </button>
        <button class="nav-item" data-page="reports" id="nav-reports">
          <svg class="nav-icon" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>Raporlar & Analiz</span>
        </button>
        <button class="nav-item" data-page="predictive" id="nav-predictive">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          <span>Kestirimci Bakım</span>
        </button>
        <button class="nav-item" data-page="reliability" id="nav-reliability">
          <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10M12 2a15.3 15.3 0 00-4 10 15.3 15.3 0 004 10M2 12h20"/></svg>
          <span>MTBF / MTTR Güvenilirlik</span>
        </button>
      </div>

      <div class="sidebar-section">
        <span class="sidebar-label">BAKIM & ARIZA</span>
        <button class="nav-item" data-page="troubleshooter" id="nav-troubleshooter">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M18 3a3 3 0 00-3 3v12a3 3 0 003 3 3 3 0 003-3V6a3 3 0 00-3-3zM6 3a3 3 0 00-3 3v12a3 3 0 003 3 3 3 0 003-3V6a3 3 0 00-3-3z"/><path d="M12 8v8M8 12h8"/></svg>
          <span>Arıza Teşhis Ağacı</span>
        </button>
        <button class="nav-item" data-page="io_link" id="nav-io_link">
          <svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2" ry="2"/><line x1="6" y1="6" x2="6" y2="18"/><line x1="18" y1="6" x2="18" y2="18"/><line x1="6" y1="12" x2="18" y2="12"/></svg>
          <span>I/O Link Teşhisi</span>
        </button>
        <button class="nav-item" data-page="backup_wizard" id="nav-backup_wizard">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span>Yedekleme Sihirbazı</span>
        </button>
        <button class="nav-item" data-page="troubleshoot_wiki" id="nav-troubleshoot_wiki">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          <span>Arıza Bilgi Bankası</span>
        </button>
        <button class="nav-item" data-page="backup_tracker" id="nav-backup_tracker">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg>
          <span>Yedek Takip Defteri</span>
        </button>
      </div>

      <div class="sidebar-section">
        <span class="sidebar-label">CNC ARAÇLARI</span>
        <button class="nav-item" data-page="tuning" id="nav-tuning">
          <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span>Ayar Sihirbazı</span>
        </button>
        <button class="nav-item" data-page="generator" id="nav-generator">
          <svg class="nav-icon" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span>G-Code Üretici</span>
        </button>
        <button class="nav-item" data-page="rs232" id="nav-rs232">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2v20M17 5H7M17 19H7M12 5v14"/></svg>
          <span>RS232 Haberleşme</span>
        </button>
        <button class="nav-item" data-page="rs232_cables" id="nav-rs232_cables">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="16" y1="10" x2="8" y2="10"/></svg>
          <span>RS232 Pin & Lehim Rehberi</span>
        </button>
        <button class="nav-item" data-page="drive_diagnostics" id="nav-drive_diagnostics">
          <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
          <span>Sürücü Teşhisi</span>
        </button>
        <button class="nav-item" data-page="spindle_diagnostics" id="nav-spindle_diagnostics">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H7M17 19H7"/><circle cx="12" cy="12" r="6"/></svg>
          <span>Spindle Teşhisi</span>
        </button>
        <button class="nav-item" data-page="gear_ratio" id="nav-gear_ratio">
          <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span>Dişli Oranı Hesabı</span>
        </button>
        <button class="nav-item" data-page="backlash_helper" id="nav-backlash_helper">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H7M17 19H7"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Eksen Boşluk Sihirbazı</span>
        </button>
        <button class="nav-item" data-page="axis_limits_helper" id="nav-axis_limits_helper">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          <span>Eksen Limit Sihirbazı</span>
        </button>
        <button class="nav-item" data-page="gcode_checker" id="nav-gcode_checker">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span>G-Code Hata Tarayıcı</span>
        </button>
        <button class="nav-item" data-page="param_comparator" id="nav-param_comparator">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
          <span>Parametre Karşılaştırıcı</span>
        </button>
        <button class="nav-item" data-page="cheat_sheets" id="nav-cheat_sheets">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <span>Hızlı Kılavuzlar</span>
        </button>
        <button class="nav-item" data-page="fssb_topology" id="nav-fssb_topology">
          <svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="7" width="6" height="4" rx="1"/><rect x="16" y="7" width="6" height="4" rx="1"/><rect x="9" y="3" width="6" height="4" rx="1"/><rect x="9" y="17" width="6" height="4" rx="1"/><line x1="8" y1="9" x2="9" y2="9"/><line x1="15" y1="9" x2="16" y2="9"/><line x1="12" y1="7" x2="12" y2="4"/><line x1="12" y1="17" x2="12" y2="19"/></svg>
          <span>FSSB Fiber Topolojisi</span>
        </button>
      </div>

      <div class="sidebar-section">
        <span class="sidebar-label">VERİ TABANLARIM</span>
        <button class="nav-item" data-page="alarms" id="nav-alarms">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>Alarm Veritabanı</span>
        </button>
        <button class="nav-item" data-page="parameters" id="nav-parameters">
          <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07M8.46 8.46a5 5 0 000 7.07"/></svg>
          <span>Parametre DB</span>
        </button>
        <button class="nav-item" data-page="keep_relays" id="nav-keep_relays">
          <svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
          <span>Keep Relay & Zamanlayıcı</span>
        </button>
        <button class="nav-item" data-page="macro" id="nav-macro">
          <svg class="nav-icon" viewBox="0 0 24 24"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
          <span>Makro Değişkenleri</span>
        </button>
        <button class="nav-item" data-page="nc_codes" id="nav-nc_codes">
          <svg class="nav-icon" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/><line x1="14" y1="4" x2="10" y2="20"/></svg>
          <span>G/M NC Kodları</span>
        </button>
        <button class="nav-item" data-page="pmc_signals" id="nav-pmc_signals">
          <svg class="nav-icon" viewBox="0 0 24 24"><line x1="6" y1="3" x2="6" y2="21"/><line x1="18" y1="3" x2="18" y2="21"/><polyline points="6,7 18,12 6,17"/></svg>
          <span>PMC Sinyal Listesi</span>
        </button>
        <button class="nav-item" data-page="custom_builder_library" id="nav-custom_builder_library">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>Üretici Alarm & M-Kodu</span>
        </button>
      </div>

      <div class="sidebar-section">
        <span class="sidebar-label">YAPAY ZEKA</span>
        <button class="nav-item" data-page="ai" id="nav-ai">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <span>AI Asistan</span>
          <span class="nav-badge ai">AI</span>
        </button>
      </div>

      <div class="sidebar-footer">
        <button class="nav-item" data-page="settings" id="nav-settings">
          <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
          <span>Ayarlar</span>
        </button>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content" id="main-content">
      <!-- Pages will be injected here -->
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
